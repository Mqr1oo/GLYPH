<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLYPH HUB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

        body {
            background-color: #050505;
            color: #00ffff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
            overflow: hidden;
        }

        .container {
            text-align: center;
            border: 2px solid #324585;
            padding: 40px;
            background: #121212;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        h1 {
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 15px 30px;
            font-weight: 700;
            transition: 0.3s;
            display: block;
            border-radius: 4px;
        }

        .btn:hover {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 15px #00ffff;
        }

        .btn.secondary {
            border-color: #324585;
            color: #888;
        }
        
        .btn.secondary:hover {
            background: #324585;
            color: #fff;
        }

        .footer {
            margin-top: 20px;
            font-size: 10px;
            color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>GLYPH OS</h1>
    <div class="menu-grid">
        <a href="dashboard/glyph.html" class="btn">TACTICAL DASHBOARD</a>
        <a href="flasher/" class="btn secondary">FIRMWARE FLASHER</a>
    </div>
    <p class="footer">STARE SISTEM: OPERAȚIONAL</p>
</div>

</body>
</html>
