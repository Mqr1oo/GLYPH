<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d0d0d">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>GLYPH APP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --bg-main: #0d0d0d;
            --bg-card: #161618;
            --bg-input: #222224;
            --border: #2a2a2d;
            --accent: #0a84ff; 
            --secure: #32d74b; 
            --danger: #ff453a;
            --text-main: #f2f2f2;
            --text-muted: #8e8e93;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        /* HEADER */
        header {
            background: var(--bg-main);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        
        .brand { display: flex; align-items: center; gap: 12px; }
        
        .logo-wrapper {
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent);
        }
        
        .brand-text { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px;}
        .status-dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; transition: 0.3s; }
        .status-dot.connected { background: #32d74b; }

        .btn-connect {
            background: rgba(10, 132, 255, 0.1);
            color: var(--accent);
            border: none;
            padding: 8px 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-connect.active { background: rgba(50, 215, 75, 0.1); color: #32d74b; }

        /* TABS CONTENT */
        .content { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .tab-pane { display: none; height: 100%; flex-direction: column; padding: 16px; overflow-y: auto; gap: 16px; }
        .tab-pane.active { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
        .card-header { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 12px; letter-spacing: 0.5px; }
        
        /* DATA GRID (STATUS) */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .data-box { background: var(--bg-main); padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
        .data-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; font-weight: 500;}
        .data-text { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 500; color: var(--text-main); }
        .data-text.highlight { color: var(--accent); font-weight: 700; font-size: 18px; }

        /* CHAT (COMMS) */
        .comms-header {
            background: var(--bg-card);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .comms-title { font-size: 13px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; }

        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-main); }
        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; font-size: 14.5px; }
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 80%; word-wrap: break-word; line-height: 1.4; }
        .msg.rx { background: var(--bg-card); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .msg.tx { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; transition: background 0.3s; }
        .msg.tx.secure { background: var(--secure); } 
        
        .input-row { display: flex; gap: 10px; padding: 12px 16px; background: var(--bg-card); border-top: 1px solid var(--border); align-items: center; padding-bottom: calc(12px + env(safe-area-inset-bottom));}
        .input-box { flex: 1; background: var(--bg-input); border: none; color: #fff; padding: 12px 16px; font-family: 'Inter', sans-serif; font-size: 15px; border-radius: 24px; outline: none; }
        .input-box::placeholder { color: #666; }
        
        .btn-send { 
            background: var(--accent); color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; flex-shrink: 0;
        }
        .btn-send.secure { background: var(--secure); }
        .btn-send:active { transform: scale(0.9); }
        .btn-send svg { width: 18px; height: 18px; fill: currentColor; margin-left: -2px; }

        /* MENU & QUICK ACTIONS */
        .menu-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); }
        .menu-row:last-child { border-bottom: none; padding-bottom: 0; }
        .menu-title { font-size: 15px; font-weight: 500; }
        
        .menu-input-group { display: flex; gap: 8px; }
        .menu-input { background: var(--bg-input); border: 1px solid var(--border); color: #fff; padding: 8px 12px; width: 110px; text-align: center; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 14px; outline: none;}
        .btn-small { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-small.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        
        .mode-toggle { display: flex; background: var(--bg-input); border-radius: 8px; padding: 2px; }
        .mode-btn { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .mode-btn.active { background: var(--bg-card); color: var(--text-main); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .mode-btn.active.secure-on { color: var(--secure); }

        /* QUICK ACTIONS GRID */
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 8px; }
        .btn-action { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 14px; border-radius: 12px; font-size: 13px; font-weight: 500; display: flex; flex-direction: column; gap: 6px; align-items: flex-start; cursor: pointer; transition: 0.1s; text-align: left; }
        .btn-action:active { background: var(--border); transform: scale(0.98); }
        .btn-action span { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

        /* BOTTOM NAV */
        .bottom-nav { background: var(--bg-main); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 10px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; cursor: pointer; transition: 0.2s; }
        .nav-btn.active { color: var(--accent); }
        .nav-icon { width: 22px; height: 22px; fill: currentColor; }

        /* MODAL */
        .modal-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: 0.2s; }
        .modal-bg.show { opacity: 1; pointer-events: auto; }
        .modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: scale(0.95); transition: 0.2s;}
        .modal-bg.show .modal-box { transform: scale(1); }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .modal-text { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; }
        .m-btn { flex: 1; padding: 12px; border: none; font-weight: 600; border-radius: 10px; font-size: 14px; cursor: pointer;}
        .m-btn.ok { background: var(--accent); color: #fff; }
        .m-btn.cancel { background: var(--bg-input); color: var(--text-main); }
    </style>
</head>

        <div class="card">
            <div class="card-header">Environment</div>
            <div class="grid-2">
                <div class="data-box">
                    <div class="data-label">TEMPERATURE</div>
                    <div class="data-text" id="val-temp">-- °C</div>
                </div>
                <div class="data-box">
                    <div class="data-label">HUMIDITY</div>
                    <div class="data-text" id="val-hum">-- %</div>
                </div>
            </div>
        </div>
    </div>

    <!-- TAB 2: COMMS (CHAT) -->
    <div id="tab-comms" class="tab-pane" style="padding: 0;">
        <div class="comms-header">
            <span class="comms-title">COMMUNICATIONS</span>
            <div class="mode-toggle">
                <button class="mode-btn active" id="sec-pub" onclick="setSecureMode('OFF')">PUBLIC</button>
                <button class="mode-btn" id="sec-sec" onclick="setSecureMode('ON')">SECURE</button>
            </div>
        </div>
        <div class="chat-area">
            <div class="messages" id="chat-box"></div>
            <div class="input-row">
                <input type="text" id="msg-input" class="input-box" placeholder="Message...">
                <button class="btn-send" id="btn-send-msg" onclick="sendTextInput()">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- TAB 3: CONTROL -->
    <div id="tab-menu" class="tab-pane">
        <div class="card">
            <div class="card-header">Network Settings</div>
            <div class="menu-row">
                <div class="menu-title">Team Channel</div>
                <div class="menu-input-group">
                    <input type="text" id="inp-team" class="menu-input" value="ALPHA">
                    <button class="btn-small primary" onclick="saveTeam()">SAVE</button>
                </div>
            </div>
            <div class="menu-row">
                <div class="menu-title">Power Mode</div>
                <div class="mode-toggle">
                    <!-- Am inlocuit apelurile directe setPwr cu confirmPwr -->
                    <button class="mode-btn active" id="pwr-normal" onclick="confirmPwr('NORMAL')">NORM</button>
                    <button class="mode-btn" id="pwr-eco" onclick="confirmPwr('ECO')">ECO</button>
                    <button class="mode-btn" id="pwr-stealth" onclick="confirmPwr('STEALTH')">STL</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">System Actions (Shortcuts)</div>
            <div class="action-grid">
                <!-- Butoanele Principale Individuale -->
                <button class="btn-action" onclick="pressBtn('A@')">
                    Press Button A
                    <span>[BTN A]</span>
                </button>
                <button class="btn-action" onclick="pressBtn('B@')">
                    Press Button B
                    <span>[BTN B]</span>
                </button>
                <button class="btn-action" onclick="pressBtn('C@')">
                    Press Button C
                    <span>[BTN C]</span>
                </button>
                
                <!-- Combinatiile (Combos) -->
                <button class="btn-action" onclick="pressBtn('AB@')">
                    Start/Stop REC
                    <span>[BTN A + B]</span>
                </button>
                <button class="btn-action" onclick="pressBtn('AC@')">
                    Reboot System
                    <span>[BTN A + C]</span>
                </button>
                <button class="btn-action" onclick="pressBtn('BC@')">
                    Force Refresh
                    <span>[BTN B + C]</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('tab-status', this)">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        STATUS
    </button>
    <button class="nav-btn" onclick="switchTab('tab-comms', this)">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        COMMS
    </button>
    <button class="nav-btn" onclick="switchTab('tab-menu', this)">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        CONTROL
    </button>
</div>

<!-- MODAL ALERTS -->
<div class="modal-bg" id="custom-modal">
    <div class="modal-box">
        <div class="modal-title" id="modal-title">Info</div>
        <div class="modal-text" id="modal-text">Message</div>
        <div class="modal-buttons" id="modal-buttons"></div>
    </div>
</div>

<script>
    // --- UI NAVIGATION ---
    function switchTab(tabId, btnElement) {
        document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btnElement.classList.add('active');
        
        if(tabId === 'tab-comms') {
            const box = document.getElementById('chat-box');
            box.scrollTop = box.scrollHeight;
        }
    }

    // --- ALERTS & CONFIRMATIONS ---
    function showAlert(title, text) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerHTML = text;
        const btns = document.getElementById('modal-buttons');
        btns.innerHTML = `<button class="m-btn ok" onclick="closeAlert()">OK</button>`;
        document.getElementById('custom-modal').classList.add('show');
    }

    // FUNCTIE NOUA PENTRU CONFIRMARI
    function showConfirm(title, text, confirmCallback) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerHTML = text;
        const btns = document.getElementById('modal-buttons');
        btns.innerHTML = `
            <button class="m-btn cancel" onclick="closeAlert()">Cancel</button>
            <button class="m-btn ok" id="confirm-btn">Confirm</button>
        `;
        document.getElementById('confirm-btn').onclick = () => {
            closeAlert();
            confirmCallback();
        };
        document.getElementById('custom-modal').classList.add('show');
    }

    function closeAlert() { document.getElementById('custom-modal').classList.remove('show'); }

    // --- STATE VARIABLES ---
    let isSecureMode = false;

    // --- BLUETOOTH & BACKGROUND SYNC ---
    const bleServiceUUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
    const bleWriteUUID   = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
    const bleNotifyUUID  = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

    let bleDevice, bleServer, rxChar, txChar, isConnected = false;
    let wakeLock = null;

    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        }
    }
    document.addEventListener('visibilitychange', () => {
        if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
    });

    document.getElementById('btn-connect').addEventListener('click', async () => {
        if (isConnected) {
            if(bleDevice) bleDevice.gatt.disconnect();
            return;
        }

        if (!navigator.bluetooth) {
            showAlert("Unsupported Browser", "Please use Chrome (Android) or Bluefy (iOS) to connect via Web Bluetooth.");
            return;
        }

        if ('Notification' in window && Notification.permission !== 'granted') Notification.requestPermission();

        try {
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'GLYPH' }],
                optionalServices: [bleServiceUUID]
            });

            bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
            bleServer = await bleDevice.gatt.connect();
            const service = await bleServer.getPrimaryService(bleServiceUUID);
            
            txChar = await service.getCharacteristic(bleWriteUUID);
            rxChar = await service.getCharacteristic(bleNotifyUUID);

            await rxChar.startNotifications();
            rxChar.addEventListener('characteristicvaluechanged', handleIncomingData);

            onConnected();
        } catch (error) {
            if (error.name === 'NotAllowedError') {
                showAlert("Permission Denied", "Please allow 'Nearby Devices' permission in Chrome settings.");
            } else if (error.name !== 'NotFoundError') {
                showAlert("Connection Error", error.message);
            }
        }
    });

    function onConnected() {
        isConnected = true;
        document.getElementById('status-dot').classList.add('connected');
        const btn = document.getElementById('btn-connect');
        btn.innerText = "DISCONNECT";
        btn.classList.add('active');
        requestWakeLock();
    }

    function onDisconnected() {
        isConnected = false;
        document.getElementById('status-dot').classList.remove('connected');
        const btn = document.getElementById('btn-connect');
        btn.innerText = "CONNECT";
        btn.classList.remove('active');
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
        
        document.getElementById('val-batt').innerText = "--%";
        document.getElementById('val-time').innerText = "--:--:--";
        document.getElementById('val-gps').innerText = "OFFLINE";
        document.getElementById('val-gps').style.color = "var(--text-muted)";
        document.getElementById('val-sats').innerText = "0";
    }

    // --- DATA PARSING ---
    function handleIncomingData(event) {
        let val = new TextDecoder().decode(event.target.value).trim();
        
        if (val.startsWith("SYS_TIME:")) { document.getElementById('val-time').innerText = val.split("SYS_TIME:")[1]; return; }
        if (val.startsWith("SYS_BATT:")) { document.getElementById('val-batt').innerText = val.split(":")[1] + "%"; return; }
        if (val.startsWith("SYS_GPS:")) { 
            let gpsData = val.split("SYS_GPS:")[1];
            let gpsEl = document.getElementById('val-gps');
            gpsEl.innerText = gpsData;
            gpsEl.style.color = gpsData.includes("NO FIX") ? "var(--text-muted)" : "var(--text-main)";
            return; 
        }
        if (val.startsWith("SYS_SATS:")) { document.getElementById('val-sats').innerText = val.split(":")[1]; return; }
        if (val.startsWith("SYS_ENV:")) {
            let parts = val.split("SYS_ENV:")[1].split(",");
            if(parts.length >= 2) {
                document.getElementById('val-temp').innerText = parts[0] + " °C";
                document.getElementById('val-hum').innerText = parts[1] + " %";
            }
            return;
        }
        
        // Chat Message (RX)
        appendMsg(val, 'rx');
        if (document.visibilityState === 'hidden' && Notification.permission === 'granted') {
            new Notification("GLYPH Message", { body: val, icon: 'icon-192.png' });
        }
    }

    function appendMsg(text, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if (type === 'tx' && isSecureMode) div.classList.add('secure');
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function sendCmd(cmd) {
        if (!txChar) { showAlert("Offline", "Please connect to the device first."); return false; }
        try {
            await txChar.writeValue(new TextEncoder().encode(cmd + '\n'));
            return true;
        } catch(e) { console.error(e); return false; }
    }

    // --- USER ACTIONS ---
    function sendTextInput() {
        const inp = document.getElementById('msg-input');
        if (inp.value.trim() && sendCmd(inp.value)) {
            appendMsg(inp.value, 'tx');
            inp.value = '';
        }
    }
    document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendTextInput(); });

    function saveTeam() {
        const team = document.getElementById('inp-team').value;
        if(sendCmd("CMD_TEAM:" + team)) showAlert("Success", `Team channel set to: ${team}`);
    }

    // CONFIRMARE POWER MODE
    function confirmPwr(mode) {
        let title = "Change Power Mode";
        let text = "";
        
        if (mode === 'NORMAL') {
            text = "Are you sure you want to switch to <b>NORMAL</b> mode?<br><br>Full performance enabled (GPS updates every 1s, Radio TX/RX active).";
        } else if (mode === 'ECO') {
            text = "Are you sure you want to switch to <b>ECO</b> mode?<br><br>Saves battery. GPS updates every 10s, lower CPU speed.";
        } else if (mode === 'STEALTH') {
            text = "Are you sure you want to switch to <b>STEALTH</b> mode?<br><br>ALL TRANSMISSIONS OFF. You will not receive or transmit messages.<br><br><span style='color: var(--danger); font-weight: bold;'>WARNING: Bluetooth connection to your phone will be stopped!</span>";
        }

        showConfirm(title, text, () => {
            setPwr(mode);
        });
    }

    // Power Modes (NORMAL, ECO, STEALTH)
    function setPwr(mode) {
        if(sendCmd("CMD_PWR:" + mode)) {
            document.getElementById('pwr-normal').classList.remove('active');
            document.getElementById('pwr-eco').classList.remove('active');
            document.getElementById('pwr-stealth').classList.remove('active');
            document.getElementById('pwr-' + mode.toLowerCase()).classList.add('active');
            
            // Pop-up extra scurt pentru succes
            setTimeout(() => { showAlert("Success", `${mode} mode activated!`); }, 300);
        }
    }

    // Secure / Public Mode
    function setSecureMode(state) {
        if(sendCmd("CMD_SEC:" + state)) {
            isSecureMode = (state === 'ON');
            document.getElementById('sec-pub').classList.remove('active');
            document.getElementById('sec-sec').classList.remove('active', 'secure-on');
            
            if (isSecureMode) {
                document.getElementById('sec-sec').classList.add('active', 'secure-on');
                document.getElementById('btn-send-msg').classList.add('secure');
                document.getElementById('msg-input').placeholder = "Secure Message...";
            } else {
                document.getElementById('sec-pub').classList.add('active');
                document.getElementById('btn-send-msg').classList.remove('secure');
                document.getElementById('msg-input').placeholder = "Public Message...";
            }
        }
    }

    // Hardware Shortcuts Mapping
    function pressBtn(comboCode) { 
        sendCmd(comboCode); 
    }

    // PWA Init
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
